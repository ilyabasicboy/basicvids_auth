services:
  basicvids_auth:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_PORT: ${APP_PORT:-8000}

    container_name: basicvids_auth
    ports:
      - "${APP_PORT:-8000}:${APP_PORT:-8000}"
    extra_hosts:
      - "${CUSTOM_HOST:-host.docker.internal}:host-gateway"
    volumes:
      - ${DATA_PATH:-./data}:/basicvids_auth/data
    environment:
      PYTHONDONTWRITEBYTECODE: 1
      PYTHONUNBUFFERED: 1
      APP_PORT: ${APP_PORT:-8000}
    entrypoint: ["/basicvids_auth/entrypoint.sh"]

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${APP_PORT:-8000}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    restart: unless-stopped

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:1.25-alpine
    container_name: basicvids_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - basicvids_auth

    restart: unless-stopped